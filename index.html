    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans Bengali', 'sans-serif'],
            },
            colors: {
              primary: {
                DEFAULT: '#0b1f3a', /* Deep Navy Blue */
                dark: '#1e3a8a',
              },
              secondary: '#F5F5F5',
              accent: {
                DEFAULT: '#facc15', /* Soft Gold / Yellow */
                dark: '#eab308'
              },
              success: '#10B981',
              danger: '#EF4444',
              darkBg: '#050505',
              darkCard: '#121212',
              darkBorder: '#1f1f1f'
            },
            animation: {
              'cube-rotate': 'rotateCube 3s infinite linear',
              'bounce-small': 'bounceSmall 0.4s ease-out',
              'cart-flash': 'cartFlash 0.5s ease-out',
            },
            keyframes: {
              rotateCube: {
                '0%': { transform: 'rotateX(-20deg) rotateY(0deg) rotateZ(0deg)' },
                '100%': { transform: 'rotateX(-20deg) rotateY(360deg) rotateZ(360deg)' }
              },
              bounceSmall: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' }
              },
              cartFlash: {
                '0%': { filter: 'drop-shadow(0 0 0px rgba(250,204,21,0))' },
                '50%': { filter: 'drop-shadow(0 0 10px rgba(250,204,21,1))' },
                '100%': { filter: 'drop-shadow(0 0 0px rgba(250,204,21,0))' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #050505;
      }
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Premium Interactions */
      .icon-interactive {
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s ease;
      }
      .icon-interactive:active {
        transform: scale(0.9);
      }

      /* Markdown Styles */
      .markdown-body p { margin-bottom: 0.5em; }
      .markdown-body p:last-child { margin-bottom: 0; }
      .markdown-body strong { font-weight: 600; color: inherit; }
      .markdown-body ul { list-style-type: disc; padding-left: 1.25em; margin-bottom: 0.5em; }
      .markdown-body ol { list-style-type: decimal; padding-left: 1.25em; margin-bottom: 0.5em; }
      .markdown-body li { margin-bottom: 0.25em; }
      .markdown-body a { color: #facc15; text-decoration: underline; }
      
      .btn-navy-gold {
        position: relative;
        overflow: hidden;
      }
      .btn-navy-gold::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.4s ease-out, height 0.4s ease-out;
      }
      .btn-navy-gold:active::after {
        width: 200%;
        height: 200%;
        transition: 0s;
      }

      /* Premium Loading Animation */
      .premium-loader-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }
      
      .premium-logo-reveal {
        position: relative;
        display: inline-block;
      }
      
      .premium-logo-reveal .logo-text {
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: 0.25em;
        color: white;
        opacity: 0;
        transform: translateY(20px);
        animation: revealText 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      .premium-logo-reveal .dot {
        color: #facc15;
        display: inline-block;
        opacity: 0;
        transform: scale(0);
        animation: popDot 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
      }
      
      .premium-loader-container.finishing .logo-text,
      .premium-loader-container.finishing .dot {
        animation: fadeOutUp 0.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      }
      
      .bg-overlay-finish {
        animation: fadeOutNavy 0.6s cubic-bezier(0.5, 0, 0.2, 1) forwards;
      }
      
      @keyframes popDot {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; text-shadow: 0 0 30px rgba(250, 204, 21, 0.9); }
      }
      
      @keyframes revealText {
        0% { opacity: 0; transform: translateY(30px) scale(0.9); letter-spacing: 0em; filter: blur(10px); }
        100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 0.2em; filter: blur(0px); }
      }
      
      @keyframes fadeOutUp {
        0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
        100% { opacity: 0; transform: translateY(-30px) scale(1.1); filter: blur(10px); letter-spacing: 0.3em; }
      }
      
      @keyframes fadeOutNavy {
        0% { background-color: #0b1f3a; opacity: 1; }
        100% { background-color: transparent; opacity: 0; visibility: hidden; }
      }

      /* Image lazy loading blur */
      .img-blur-load {
        filter: blur(10px);
        transform: scale(0.95);
        transition: filter 0.8s ease-out, transform 0.8s ease-out;
      }
      .img-blur-loaded {
        filter: blur(0);
        transform: scale(1);
        transition: filter 0.8s ease-out, transform 0.8s ease-out;
      }

      /* Micro Interaction for icons */
      .icon-interactive {
        transition: transform 0.3s ease, color 0.3s ease;
      }
      .icon-interactive:hover {
        transform: scale(1.15);
        color: #facc15;
      }

      /* Micro link underline hover */
      .hover-underline-gold {
        position: relative;
        text-decoration: none;
      }
      .hover-underline-gold::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: #facc15;
        transform: scaleX(0);
        transform-origin: bottom right;
        transition: transform 0.3s ease-out;
      }
      .hover-underline-gold:hover::after {
        transform: scaleX(1);
        transform-origin: bottom left;
      }

      /* Premium Card Hover Effect */
      .product-card-premium {
        transition: transform 0.3s ease-out, box-shadow 0.3s ease-out, border-color 0.3s ease-out;
      }
      .product-card-premium:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 30px rgba(11, 31, 58, 0.15);
        border-color: rgba(250, 204, 21, 0.3) !important;
      }
      
      /* Premium Button Glow */
      .btn-navy-gold {
        transition: all 0.3s ease;
      }
      .btn-navy-gold:hover {
        box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
      }
    </style>
