<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUR | শপিং হোক নিশ্চিন্তে</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans Bengali', 'sans-serif'],
            },
            colors: {
              primary: {
                DEFAULT: '#0b1f3a', /* Deep Navy Blue */
                dark: '#1e3a8a',
              },
              secondary: '#F5F5F5',
              accent: {
                DEFAULT: '#facc15', /* Soft Gold / Yellow */
                dark: '#eab308'
              },
              success: '#10B981',
              danger: '#EF4444',
              darkBg: '#050505',
              darkCard: '#121212',
              darkBorder: '#1f1f1f'
            },
            animation: {
              'cube-rotate': 'rotateCube 3s infinite linear',
              'bounce-small': 'bounceSmall 0.4s ease-out',
              'cart-flash': 'cartFlash 0.5s ease-out',
            },
            keyframes: {
              rotateCube: {
                '0%': { transform: 'rotateX(-20deg) rotateY(0deg) rotateZ(0deg)' },
                '100%': { transform: 'rotateX(-20deg) rotateY(360deg) rotateZ(360deg)' }
              },
              bounceSmall: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' }
              },
              cartFlash: {
                '0%': { filter: 'drop-shadow(0 0 0px rgba(250,204,21,0))' },
                '50%': { filter: 'drop-shadow(0 0 10px rgba(250,204,21,1))' },
                '100%': { filter: 'drop-shadow(0 0 0px rgba(250,204,21,0))' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #050505;
      }
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Scroll Reveal Animation */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.6s cubic-bezier(0.5, 0, 0, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Cube Loading Animation */
      .cube-loader-container {
        perspective: 800px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cube {
        width: 60px;
        height: 60px;
        position: relative;
        transform-style: preserve-3d;
      }
      
      /* Inner Glowing Core */
      .cube::before {
        content: '';
        position: absolute;
        width: 30px;
        height: 30px;
        top: 15px;
        left: 15px;
        background: #facc15;
        box-shadow: 0 0 40px 15px #facc15, inset 0 0 10px #fff;
        border-radius: 50%;
        transform: translateZ(0);
        animation: innerPulse 1.5s infinite alternate ease-in-out;
      }
      
      @keyframes innerPulse {
        0% { transform: scale(0.8); opacity: 0.8; }
        100% { transform: scale(1.1); opacity: 1; }
      }

      .cube-face {
        position: absolute;
        width: 60px;
        height: 60px;
        background: radial-gradient(circle at center, rgba(30, 58, 138, 0.7) 0%, rgba(11, 31, 58, 0.95) 100%);
        border: 1.5px solid rgba(250, 204, 21, 0.6);
        box-shadow: inset 0 0 20px rgba(250, 204, 21, 0.3), 0 0 10px rgba(250, 204, 21, 0.2);
        backdrop-filter: blur(4px);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cube-face-front  { transform: translateZ(30px); }
      .cube-face-back   { transform: rotateY(180deg) translateZ(30px); }
      .cube-face-left   { transform: rotateY(-90deg) translateZ(30px); }
      .cube-face-right  { transform: rotateY(90deg) translateZ(30px); }
      .cube-face-top    { transform: rotateX(90deg) translateZ(30px); }
      .cube-face-bottom { transform: rotateX(-90deg) translateZ(30px); }

      /* Explosion Finish Animation */
      .finishing-cube .cube {
        animation: explodeCube 0.5s forwards cubic-bezier(0.4, 0, 0.2, 1);
      }
      .finishing-cube .cube-face {
        animation: glowEdges 0.5s forwards;
      }
      .bg-overlay-finish {
        animation: fadeOutNavy 0.5s forwards;
      }
      @keyframes explodeCube {
        0% { transform: scale(1) rotateX(-20deg) rotateY(var(--current-rot, 0deg)) rotateZ(0deg); }
        100% { transform: scale(3) rotateX(10deg) rotateY(180deg) rotateZ(90deg); opacity: 0; }
      }
      @keyframes glowEdges {
        0% { border-color: rgba(250, 204, 21, 0.5); box-shadow: inset 0 0 8px rgba(250, 204, 21, 0.1); }
        100% { border-color: rgba(250, 204, 21, 1); box-shadow: 0 0 30px rgba(250, 204, 21, 1); opacity: 0; }
      }
      @keyframes fadeOutNavy {
        0% { background: linear-gradient(135deg, rgba(11, 31, 58, 0.95), rgba(5, 15, 30, 0.95)); }
        100% { background: transparent; opacity: 0; visibility: hidden; }
      }

      /* Image lazy loading blur */
      .img-blur-load {
        filter: blur(10px);
        transform: scale(0.95);
        transition: filter 0.8s ease-out, transform 0.8s ease-out;
      }
      .img-blur-loaded {
        filter: blur(0);
        transform: scale(1);
        transition: filter 0.8s ease-out, transform 0.8s ease-out;
      }

      /* Micro Interaction for icons */
      .icon-interactive {
        transition: transform 0.3s ease, color 0.3s ease;
      }
      .icon-interactive:hover {
        transform: scale(1.15);
        color: #facc15;
      }

      /* Micro link underline hover */
      .hover-underline-gold {
        position: relative;
        text-decoration: none;
      }
      .hover-underline-gold::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: #facc15;
        transform: scaleX(0);
        transform-origin: bottom right;
        transition: transform 0.3s ease-out;
      }
      .hover-underline-gold:hover::after {
        transform: scaleX(1);
        transform-origin: bottom left;
      }

      /* Premium Card Hover Effect */
      .product-card-premium {
        transition: transform 0.3s ease-out, box-shadow 0.3s ease-out, border-color 0.3s ease-out;
      }
      .product-card-premium:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 30px rgba(11, 31, 58, 0.15);
        border-color: rgba(250, 204, 21, 0.3) !important;
      }
      
      /* Premium Button Glow */
      .btn-navy-gold {
        transition: all 0.3s ease;
      }
      .btn-navy-gold:hover {
        box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
      }
    </style>

{
  "imports": {
